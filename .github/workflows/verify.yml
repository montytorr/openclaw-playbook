name: verify

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Verify setup.sh syntax
        run: bash -n setup.sh

      - name: Compile reference Python scripts
        run: python3 -m py_compile reference/scripts/task reference/scripts/mem-extract reference/scripts/mem-search reference/scripts/integrity-check reference/scripts/verify-memory-readiness reference/scripts/verify reference/scripts/verify-brownfield reference/scripts/verify-local reference/scripts/check-release-hygiene reference/adapters/task-wrapper.example.py

      - name: Check release hygiene (pull requests)
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.event.pull_request.base.sha }}
          HEAD_REF: ${{ github.event.pull_request.head.sha }}
        run: python3 reference/scripts/check-release-hygiene

      - name: Check release hygiene (pushes)
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        env:
          BASE_REF: ${{ github.event.before }}
          HEAD_REF: ${{ github.sha }}
        run: python3 reference/scripts/check-release-hygiene

      - name: Run reference verification
        run: |
          reference/scripts/verify
          reference/scripts/verify-brownfield
