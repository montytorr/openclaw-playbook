name: verify

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Verify setup.sh syntax
        run: bash -n setup.sh

      - name: Compile reference Python scripts
        run: python3 -m py_compile reference/scripts/task reference/scripts/mem-extract reference/scripts/mem-search reference/scripts/verify

      - name: Run reference verification
        run: reference/scripts/verify
